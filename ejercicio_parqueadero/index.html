<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Parqueadero</title>
<link rel="stylesheet" href="stylep.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="text-center mb-4">
Control Parqueadero
</h2>

<div class="card p-4">

<label>Tipo vehículo</label>
<select id="tipo" class="form-control">
<option>Automóvil</option>
<option>Moto</option>
</select>

<label class="mt-3">Placa</label>
<input id="placa" class="form-control">

<label class="mt-3">Ingreso</label>
<input type="datetime-local" id="ingreso" class="form-control">

<label class="mt-3">Salida</label>
<input type="datetime-local" id="salida" class="form-control">

<label class="mt-3">Dinero entregado</label>
<input type="number" id="pago" class="form-control">

<button onclick="calcular()" class="btn btn-primary mt-4">
Calcular
</button>

<div class="mt-4" id="resultado"></div>

</div>

</div>

<script src="parking.js"></script>

</body>
</html>

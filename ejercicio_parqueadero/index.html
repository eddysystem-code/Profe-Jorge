<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="parqueadero.css">
    <title>Parqueadero Parchese</title>
</head>
<body>

    <main>

        <div class="formulario">

            <div class="logo">
                <h1>
                    Parqueadero <br>
                    Parchese
                </h1>
            </div>

            <br>

            <!-- DATOS DEL VEHICULO -->

            <div class="placas">

                <label for="tipoVehiculo">
                    Tipo de Vehículo
                </label>

                <input
                    type="text"
                    id="tipoVehiculo"
                    placeholder="automovil o moto"
                >

                <label for="placa">
                    Placa
                </label>

                <input
                    type="text"
                    id="placa"
                    placeholder="ABC123"
                >

            </div>

            <br>

            <!-- FECHAS -->

            <div class="horario">

                <label for="fechaIngreso">
                    Fecha de ingreso
                </label>

                <input
                    type="datetime-local"
                    id="fechaIngreso"
                >

                <label for="fechaSalida">
                    Fecha de salida
                </label>

                <input
                    type="datetime-local"
                    id="fechaSalida"
                >

            </div>

            <br>

            <!-- DINERO DEL CLIENTE -->

            <div class="horario">

                <label for="dineroCliente">
                    Dinero entregado
                </label>

                <input
                    type="number"
                    id="dineroCliente"
                    placeholder="50000"
                >

            </div>

            <br>

            <!-- BOTON -->

            <button id="calcular">
                Calcular Pago
            </button>

            <br>

            <!-- RESULTADOS -->

            <div id="resultado">

            </div>

        </div>

    </main>

    <script src="codigo.js"></script>

</body>
</html>
